<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand & Social — Weekly Check-ins</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .reply-text { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
    .reply-text.expanded { display: block; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <div class="max-w-5xl mx-auto px-4 py-8">

    <!-- Header -->
    <div class="mb-8">
      <h1 class="text-2xl font-bold text-gray-900">Brand & Social — Weekly Check-ins</h1>
      <p id="weekLabel" class="text-gray-500 mt-1"></p>

      <div class="mt-4 flex items-center gap-4 flex-wrap">
        <div class="flex-1 min-w-48">
          <div class="flex justify-between text-sm text-gray-600 mb-1">
            <span id="responseLabel">— / 10 responded</span>
            <span id="responsePct"></span>
          </div>
          <div class="w-full bg-gray-200 rounded-full h-2.5">
            <div id="progressBar" class="bg-green-500 h-2.5 rounded-full transition-all" style="width:0%"></div>
          </div>
        </div>
        <button id="refreshBtn"
          class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 active:scale-95 transition-all">
          ↻ Refresh Replies
        </button>
      </div>

      <!-- No-reply alert -->
      <div id="alertBanner" class="hidden mt-4 bg-red-50 border border-red-300 text-red-800 rounded-lg px-4 py-3 text-sm"></div>
    </div>

    <!-- Social Team -->
    <section class="mb-8">
      <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-3">Social Team</h2>
      <div id="socialGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

    <!-- Brand Team -->
    <section>
      <h2 class="text-sm font-semibold uppercase tracking-wider text-gray-400 mb-3">Brand Team</h2>
      <div id="brandGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4"></div>
    </section>

  </div>

  <script>
    const TEAM_ORDER = {
      social: ["U08QZEDGMFE","U0A83LZ00SE","U0631BJ094Z","U03QQHPDJDV","U02QWTEDB5M"],
      brand:  ["U08QFN6M279","U07BRM03N74","U0A4X4PUU4Q","U08N156N35W","U07SNV3PGQP"],
    };

    function getWeekKey(date = new Date()) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dayNum = d.getUTCDay() || 7;
      d.setUTCDate(d.getUTCDate() + 4 - dayNum);
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      const weekNo = Math.ceil((((d - yearStart) / 86400000) + 1) / 7);
      return `${d.getUTCFullYear()}-W${String(weekNo).padStart(2, '0')}`;
    }

    function weekLabel(weekKey) {
      // Parse ISO week to a "Week of Mon DD, YYYY" string
      const [year, w] = weekKey.split('-W');
      const jan4 = new Date(Date.UTC(+year, 0, 4));
      const monday = new Date(jan4);
      monday.setUTCDate(jan4.getUTCDate() - (jan4.getUTCDay() || 7) + 1 + (+w - 1) * 7);
      return `Week of ${monday.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric', timeZone: 'UTC' })}`;
    }

    function statusPill(member) {
      if (!member) return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-500">⚫ Not sent</span>`;
      if (member.replied) return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-700">🟢 Replied</span>`;
      return `<span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-xs font-medium bg-amber-100 text-amber-700">🟡 Awaiting</span>`;
    }

    function cardBg(member) {
      if (!member) return 'bg-gray-50 border-gray-200';
      if (member.replied) return 'bg-green-50 border-green-200';
      return 'bg-amber-50 border-amber-200';
    }

    function fmtTime(iso) {
      if (!iso) return '';
      return new Date(iso).toLocaleString('en-IN', { weekday: 'short', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', timeZone: 'Asia/Kolkata' }) + ' IST';
    }

    function renderCard(userId, member, fallback) {
      const name = member?.name || fallback?.name || userId;
      const role = member?.role || fallback?.role || '';
      const reportsTo = member?.reportsTo || fallback?.reportsTo || '';
      const bg = cardBg(member);

      let replyHtml = '';
      if (member?.replied && member?.replyText) {
        const long = member.replyText.length > 200;
        replyHtml = `
          <div class="mt-3 text-sm text-gray-700 border-t border-current border-opacity-10 pt-3">
            <p class="reply-text${long ? '' : ' expanded'}" id="rt-${userId}">${escHtml(member.replyText)}</p>
            ${long ? `<button onclick="toggleReply('${userId}')" class="text-xs text-blue-600 mt-1 hover:underline" id="tb-${userId}">Show more</button>` : ''}
            <p class="text-xs text-gray-400 mt-1">${fmtTime(member.repliedAt)}</p>
          </div>`;
      }

      return `
        <div class="rounded-xl border ${bg} p-4 flex flex-col gap-2">
          <div class="flex items-start justify-between gap-2">
            <div>
              <p class="font-semibold text-gray-900 text-sm">${escHtml(name)}</p>
              <p class="text-xs text-gray-500">${escHtml(role)}</p>
            </div>
            ${statusPill(member)}
          </div>
          <span class="text-xs text-gray-400">Reports to: ${escHtml(reportsTo)}</span>
          ${replyHtml}
        </div>`;
    }

    function escHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    window.toggleReply = function(userId) {
      const el = document.getElementById('rt-' + userId);
      const btn = document.getElementById('tb-' + userId);
      if (el.classList.contains('expanded')) {
        el.classList.remove('expanded');
        btn.textContent = 'Show more';
      } else {
        el.classList.add('expanded');
        btn.textContent = 'Show less';
      }
    };

    // Static fallback roster for cards with no sent data
    const ROSTER = {
      "U08QZEDGMFE": { name:"Sanjana Shetty",      role:"Social Lead",                  reportsTo:"Varun",   group:"social" },
      "U0A83LZ00SE": { name:"Shristy Khemka",      role:"Twitter/X & Owned Media",       reportsTo:"Sanjana", group:"social" },
      "U0631BJ094Z": { name:"Mandhara Mahabalesh", role:"Instagram / Product / LinkedIn", reportsTo:"Sanjana", group:"social" },
      "U03QQHPDJDV": { name:"Jude Lopez",           role:"Founder Content",               reportsTo:"Sanjana", group:"social" },
      "U02QWTEDB5M": { name:"Rashmee Lahon",        role:"IPO Social Readiness",          reportsTo:"Sanjana", group:"social" },
      "U08QFN6M279": { name:"Akash Wadhwa",         role:"Brand Lead",                    reportsTo:"Varun",   group:"brand" },
      "U07BRM03N74": { name:"Ishan Gupta",           role:"Founder Content / Brand",       reportsTo:"Akash",   group:"brand" },
      "U0A4X4PUU4Q": { name:"Ajmal P",              role:"Founder Content",               reportsTo:"Akash",   group:"brand" },
      "U08N156N35W": { name:"Nivedita Prabhu",      role:"Brand",                         reportsTo:"Varun",   group:"brand" },
      "U07SNV3PGQP": { name:"Anoushka Bhada",       role:"PMM Engage",                   reportsTo:"Varun",   group:"brand" },
    };

    function render(allData) {
      const weekKey = getWeekKey();
      document.getElementById('weekLabel').textContent = weekLabel(weekKey);

      const week = allData[weekKey];
      const members = week?.members || {};

      let replied = 0;
      const notReplied = [];
      Object.values(ROSTER).forEach(r => {});
      for (const [uid, m] of Object.entries(members)) {
        if (m.replied) replied++;
        else notReplied.push(m.name);
      }

      const total = 10;
      const pct = Math.round((replied / total) * 100);
      document.getElementById('responseLabel').textContent = `${replied} / ${total} responded`;
      document.getElementById('responsePct').textContent = `${pct}%`;
      document.getElementById('progressBar').style.width = pct + '%';

      // Alert banner
      const dayOfWeek = new Date().getDay(); // 0=Sun, 3=Wed
      const alertEl = document.getElementById('alertBanner');
      if (dayOfWeek >= 3 && pct < 80 && notReplied.length > 0) {
        alertEl.classList.remove('hidden');
        alertEl.innerHTML = `⚠️ ${notReplied.length} team member${notReplied.length > 1 ? 's' : ''} haven't replied yet — consider a follow-up.<br><strong>${notReplied.join(', ')}</strong>`;
      } else {
        alertEl.classList.add('hidden');
      }

      ['social','brand'].forEach(group => {
        const grid = document.getElementById(group + 'Grid');
        grid.innerHTML = TEAM_ORDER[group]
          .map(uid => renderCard(uid, members[uid] || null, ROSTER[uid]))
          .join('');
      });
    }

    async function loadStatus() {
      const res = await fetch('/api/status');
      return res.json();
    }

    async function refresh() {
      const btn = document.getElementById('refreshBtn');
      btn.disabled = true;
      btn.textContent = 'Refreshing…';
      try {
        const res = await fetch('/api/collect', { method: 'POST' });
        const data = await res.json();
        render(data);
      } catch (e) {
        alert('Failed to refresh: ' + e.message);
      } finally {
        btn.disabled = false;
        btn.textContent = '↻ Refresh Replies';
      }
    }

    document.getElementById('refreshBtn').addEventListener('click', refresh);

    // Initial load + 30-min poll
    loadStatus().then(render);
    setInterval(() => fetch('/api/collect', { method:'POST' }).then(r=>r.json()).then(render), 30 * 60 * 1000);
  </script>
</body>
</html>
